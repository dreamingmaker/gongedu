services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend/education.db:/app/education.db
      - ./backend/uploads:/app/uploads
      - ./logs:/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
