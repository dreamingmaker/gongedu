services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/backup:/app/backup
      - ./logs:/logs
    restart: unless-stopped

  frontend:
    image: ghcr.io/baenong/gongedu-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
